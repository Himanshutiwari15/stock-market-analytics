[pytest]
# Add the project root directory to Python's import path.
# This makes "from src.ingestion.fetcher import ..." work when pytest runs.
#
# WHY this is needed:
#   Python only searches for modules in directories it knows about.
#   By default, pytest does not add your project root to that list.
#   Without this, "import src" fails with ModuleNotFoundError.
#   "pythonpath = ." means "also look in the current directory (.)".
#
# testpaths tells pytest where to look for tests.
#   Without it, pytest searches everywhere — slow and noisy.
pythonpath = .
testpaths = tests
# Suppress the pandas/pyarrow informational warning.
# This is not a bug — pandas is announcing a future dependency change.
# We filter it so test output stays clean and readable.
filterwarnings =
    ignore::FutureWarning:yfinance
    ignore::DeprecationWarning:yfinance
    ignore:.*pyarrow.*:UserWarning
